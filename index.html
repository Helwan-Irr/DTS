<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة ري حلوان الرقمية - DTS</title>
    <style>
        :root { --primary: #006633; --accent: #cc9900; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; border-bottom: 4px solid var(--accent); }
        .container { max-width: 1100px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .full-width { grid-column: 1 / -1; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #004d26; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: right; }
        th { background: #f8f9fa; color: var(--primary); }
        .status-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        #loader { display: none; text-align: center; color: var(--accent); font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<header>
    <h2>الإدارة العامة لري حلوان</h2>
    <p>منظومة التحول الرقمي (DTS) - سجل المكاتبات المطور</p>
</header>

<div class="container">
    <div class="form-grid">
        <div class="form-group">
            <label>السنة المالية</label>
            <select id="financialYear">
                <option>2024/2025</option>
                <option selected>2025/2026</option>
                <option>2026/2027</option>
            </select>
        </div>

        <div class="form-group">
            <label>الإدارة المختصة</label>
            <select id="department">
                <option>مكتب المدير العام</option>
                <option>إدارة الشؤون المالية والإدارية</option>
                <option>إدارة التخطيط والمتابعة</option>
                <option>إدارة الهندسات والري</option>
                <option>إدارة التوجيه المائي</option>
                <option>قسم الموازنة والعقود</option>
            </select>
        </div>

        <div class="form-group">
            <label>تصنيف المكاتبة</label>
            <select id="type">
                <option value="وارد خارجي">وارد خارجي</option>
                <option value="صادر خارجي">صادر خارجي</option>
                <option value="مكاتبة داخلية">مكاتبة داخلية</option>
                <option value="تظلمات وشكاوى">تظلمات وشكاوى</option>
                <option value="تقارير دورية">تقارير دورية</option>
            </select>
        </div>

        <div class="form-group">
            <label>رقم القيد / الخطاب</label>
            <input type="text" id="docNumber" placeholder="مثلاً: 125-أ">
        </div>

        <div class="form-group">
            <label>الجهة (من / إلى)</label>
            <input type="text" id="entity" placeholder="اسم الوزارة أو القطاع">
        </div>

        <div class="form-group">
            <label>موضوع المكاتبة</label>
            <input type="text" id="subject" placeholder="وصف مختصر للخطاب">
        </div>

        <div class="form-group full-width">
            <label>إرفاق نسخة ضوئية (صورة الخطاب)</label>
            <input type="file" id="fileUpload" accept="image/*,application/pdf">
        </div>
    </div>

    <button onclick="uploadAndSave()">حفظ البيانات في السجل الرقمي</button>
    <div id="loader">جاري الحفظ والرفع... يرجى عدم إغلاق الصفحة</div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3>آخر المكاتبات المسجلة</h3>
    <table id="dataTable">
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>السنة</th>
                <th>الإدارة</th>
                <th>التصنيف</th>
                <th>الرقم</th>
                <th>الموضوع</th>
                <th>الملف</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const GITHUB_TOKEN = 'ghp_mB85YIiwivI6rAw5JM0z68EvXqRc1n4A207g';
    const CONFIG = {
        owner: 'Helwan-Irr',
        repo: 'DTS',
        path: 'data/database.json',
        clName: 'dtfointih',
        clPreset: 'Helwan Irrigation DTS'
    };

    window.onload = loadData;

    async function uploadAndSave() {
        const file = document.getElementById('fileUpload').files[0];
        if (!file) return alert("يرجى إرفاق صورة الخطاب أولاً");
        
        document.getElementById('loader').style.display = 'block';

        try {
            // 1. الرفع لـ Cloudinary
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CONFIG.clPreset);
            const clRes = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.clName}/upload`, {method: 'POST', body: formData});
            const clData = await clRes.json();

            // 2. تجهيز البيانات
            const entry = {
                timestamp: new Date().toLocaleString('ar-EG'),
                year: document.getElementById('financialYear').value,
                dept: document.getElementById('department').value,
                type: document.getElementById('type').value,
                num: document.getElementById('docNumber').value,
                entity: document.getElementById('entity').value,
                sub: document.getElementById('subject').value,
                url: clData.secure_url
            };

            // 3. التحديث في GitHub
            await saveToGitHub(entry);
            alert("تم الحفظ بنجاح!");
            location.reload();
        } catch (e) {
            alert("خطأ: " + e.message);
        }
    }

    async function saveToGitHub(newEntry) {
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        const res = await fetch(url, { headers: {'Authorization': `token ${GITHUB_TOKEN}`} });
        const file = await res.json();
        const content = JSON.parse(decodeURIComponent(escape(atob(file.content))));
        content.push(newEntry);

        await fetch(url, {
            method: 'PUT',
            headers: {'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json'},
            body: JSON.stringify({
                message: "إضافة خطاب جديد: " + newEntry.num,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                sha: file.sha
            })
        });
    }

    async function loadData() {
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        try {
            const res = await fetch(url, { headers: {'Authorization': `token ${GITHUB_TOKEN}`} });
            const file = await res.json();
            const data = JSON.parse(decodeURIComponent(escape(atob(file.content))));
            const tbody = document.querySelector("#dataTable tbody");
            
            data.reverse().slice(0, 15).forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.timestamp.split(',')[0]}</td>
                    <td>${item.year}</td>
                    <td>${item.dept}</td>
                    <td><span class="status-tag">${item.type}</span></td>
                    <td>${item.num}</td>
                    <td>${item.sub}</td>
                    <td><a href="${item.url}" target="_blank">📄 عرض</a></td>
                </tr>`;
            });
        } catch (e) { console.log("السجل فارغ"); }
    }
</script>

</body>
</html>
