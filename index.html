<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم DTS - ري حلوان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI'; background: var(--bg); margin: 0; display: none; }
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .main-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .action-box { background: white; padding: 40px; border-radius: 15px; text-decoration: none; color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .action-box:hover { transform: translateY(-5px); }
        .action-box i { font-size: 3rem; margin-bottom: 20px; display: block; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div><span id="userName">...</span></div>
        <b>منظومة DTS - إدارة ري حلوان</b>
        <button class="btn-logout" onclick="logout()">خروج</button>
    </header>

    <div class="container">
        <h1>مرحباً بك في الأرشيف الرقمي</h1>
        <div class="main-actions">
            <a href="add-letter.html" class="action-box">
                <i class="fas fa-plus-circle"></i>
                <h2>إضافة خطاب جديد</h2>
            </a>
            <a href="manage-letters.html" class="action-box">
                <i class="fas fa-search"></i>
                <h2>البحث في الأرشيف</h2>
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBq2sDkdYb5CdDtxBQA82jhh1jfaQvIjVM",
            authDomain: "dts-helwan.firebaseapp.com",
            projectId: "dts-helwan",
            storageBucket: "dts-helwan.firebasestorage.app",
            messagingSenderId: "95183261793",
            appId: "1:95183261793:web:48edf7d6ae44948dc61a20"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                // التأكد من أن الإيميل مسموح له بالدخول
                db.collection("authorized_emails").doc(user.email).get().then((doc) => {
                    if (doc.exists) {
                        document.body.style.display = "block";
                        document.getElementById('userName').innerText = user.displayName;
                    } else {
                        alert("عذراً، هذا الحساب غير مضاف في المنظومة.");
                        auth.signOut();
                    }
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function logout() {
            auth.signOut().then(() => { window.location.href = "login.html"; });
        }
    </script>
</body>
</html>
